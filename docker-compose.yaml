version: '3.8'

services:
  node1:
    build: .
    environment:
      - NODE_ID=node1
      - PORT=5001
    ports:
      - "5001:5001"
    networks:
      - raft_network

  node2:
    build: .
    environment:
      - NODE_ID=node2
      - PORT=5002
    ports:
      - "5002:5002"
    networks:
      - raft_network

  node3:
    build: .
    environment:
      - NODE_ID=node3
      - PORT=5003
    ports:
      - "5003:5003"
    networks:
      - raft_network

networks:
  raft_network:
    driver: bridge